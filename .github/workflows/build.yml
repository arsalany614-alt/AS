name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev python3-dev
        sudo apt-get install -y ccache git libncurses5:i386 libstdc++6:i386 unzip zlib1g-dev openjdk-17-jdk
        pip install --upgrade Cython==0.29.33 virtualenv buildozer

    - name: Build with Buildozer
      run: |
        export CFLAGS="-O2 -D__ANDROID__"
        export LDFLAGS=""
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Android-APK
        path: .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/asapp/bin/*.apk
