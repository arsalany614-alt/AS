name: Build SENTRA AS Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            pkg-config \
            python3-dev \
            zip \
            unzip \
            zlib1g-dev \
            libgdbm-dev \
            libncurses5-dev \
            libsqlite3-dev \
            libreadline-dev \
            bzip2 \
            libbz2-dev \
            liblzma-dev \
            tk-dev \
            libdb-dev \
            autoconf \
            libtool \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev

      - name: Cache Buildozer Downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Buildozer and Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "Cython>=0.29.21,<3.0.0"
          python -m pip install buildozer

      - name: Build Android APK
        env:
          ACCEPT_SDK_LICENSE: "true"
        run: |
          # Use yes to automatically accept Android SDK licenses if requested
          yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentra-as-debug-apk
          path: bin/*.apk
          if-no-files-found: error
