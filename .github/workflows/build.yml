name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Buildozer Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev python3-dev unzip zlib1g-dev git ccache autoconf automake libtool pkg-config cmake
        pip install --upgrade pip
        pip install --upgrade "Cython<3.0.0" virtualenv buildozer

    - name: Clean Old Buildozer Cache
      run: |
        buildozer android clean

    - name: Build with Buildozer
      run: |
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/asapp/bin/*.apk
